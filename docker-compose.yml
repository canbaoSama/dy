# 完整方案：PostgreSQL + Redis（MVP 默认用 SQLite，可不启动本文件）
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
      POSTGRES_DB: factory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
